<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic-Tac-Toe</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
</head>

<body>

    <main>
        <div class="modal">
        </div>
        <section>
            <div class="infos">
                <h3 class="info">Player X : <span id="x-score">00</span></h3>
                <h3 class="info">Tie : <span id="tie">00</span></h3>
                <h3 class="info">Player O : <span id="o-score">00</span></h3>
            </div>
            <div class="board">
                <div class="play">
                    <div class="square top left">
                        <div id="1" class="cell">
                        </div>
                    </div>
                    <div class="square top">
                        <div id="2" class="cell">
                        </div>
                    </div>
                    <div class="square top right">
                        <div id="3" class="cell">
                        </div>
                    </div>
                    <div class="square left">
                        <div id="4" class="cell">
                        </div>
                    </div>
                    <div class="square">
                        <div id="5" class="cell">
                        </div>
                    </div>
                    <div class="square right">
                        <div id="6" class="cell">
                        </div>
                    </div>
                    <div class="square bottom left">
                        <div id="7" class="cell">
                        </div>
                    </div>
                    <div class="square bottom">
                        <div id="8" class="cell">
                        </div>
                    </div>
                    <div class="square bottom right">
                        <div id="9" class="cell">
                        </div>
                    </div>
                </div>
                <!-- <h2 id="statusText">X's turn</h2> -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
